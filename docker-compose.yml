services:
  app:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - ./uploads:/public/uploads
    environment:
      DATABASE_URL: "postgresql://orchid_user:orchid_password@db:5432/orchid_db"
      NEXTAUTH_SECRET: "b4d8e56a2c3f4e8790123456789abcdef1234567890abcdef1234567890abcdef"
      NEXTAUTH_URL: "https://orchid.mn" # Change to your domain or server IP in prod
      QPAY_USERNAME: "ORCHID"
      QPAY_PASSWORD: "9zhYtl8y"
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    restart: always
    container_name: db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: orchid_user
      POSTGRES_PASSWORD: orchid_password
      POSTGRES_DB: orchid_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
